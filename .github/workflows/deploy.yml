name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -f apps/backend/Dockerfile \
            -t layerframe-backend:${{ github.sha }} \
            -t layerframe-backend:latest \
            .

